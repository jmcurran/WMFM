name: R tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools

      - name: Regenerate roxygen documentation
        run: devtools::document()
        shell: Rscript {0}

      - name: Check for stale generated documentation
        run: |
          tracked_changes="$(git diff --name-only -- NAMESPACE man)"
          untracked_changes="$(git ls-files --others --exclude-standard -- NAMESPACE man)"

          if [ -n "$tracked_changes$untracked_changes" ]; then
            echo "Generated documentation is stale. Please run devtools::document() and commit all doc changes."
            echo "Tracked generated-file changes:"
            printf '%s\n' "$tracked_changes"
            echo "Untracked generated files:"
            printf '%s\n' "$untracked_changes"
            git status --short -- NAMESPACE man
            git diff -- NAMESPACE man
            exit 1
          fi

      - name: Run testthat suite
        run: devtools::test()
        shell: Rscript {0}
