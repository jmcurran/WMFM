name: R tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools

      - name: Regenerate roxygen documentation
        run: devtools::document()
        shell: Rscript {0}

      - name: Check for stale generated documentation
        run: |
          if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            echo "Generated documentation is stale. Please run devtools::document() and commit all tracked/untracked doc changes."
            git status --short
            git diff
            exit 1
          fi

      - name: Run testthat suite
        run: devtools::test()
        shell: Rscript {0}
